<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星骰 · 占星骰子</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, "PingFang SC", "Noto Sans SC", system-ui, sans-serif;
    background: linear-gradient(145deg, #0a0a1a 0%, #0d0d2b 40%, #0f0a1a 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 24px;
    color: #e8e0d4;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(232,224,212,0.3), transparent),
      radial-gradient(1px 1px at 40% 70%, rgba(232,224,212,0.2), transparent),
      radial-gradient(1.5px 1.5px at 60% 20%, rgba(232,224,212,0.4), transparent),
      radial-gradient(1px 1px at 80% 50%, rgba(232,224,212,0.2), transparent),
      radial-gradient(1px 1px at 10% 80%, rgba(232,224,212,0.3), transparent),
      radial-gradient(1.5px 1.5px at 70% 90%, rgba(232,224,212,0.25), transparent),
      radial-gradient(1px 1px at 30% 50%, rgba(232,224,212,0.15), transparent),
      radial-gradient(1px 1px at 90% 10%, rgba(232,224,212,0.2), transparent),
      radial-gradient(1px 1px at 50% 40%, rgba(232,224,212,0.1), transparent);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 680px;
    background: rgba(18, 16, 30, 0.75);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(212, 165, 116, 0.15);
    border-radius: 36px;
    padding: 48px 40px 40px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.04);
  }

  .header { text-align: center; margin-bottom: 32px; }
  .header h1 {
    font-size: 28px; font-weight: 700; letter-spacing: 8px;
    background: linear-gradient(135deg, #d4a574 0%, #e8d5b0 50%, #d4a574 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .header .subtitle { font-size: 13px; color: rgba(232,224,212,0.4); letter-spacing: 4px; margin-top: 6px; }

  /* 问题区 */
  .question-area { margin-bottom: 28px; }
  .question-area .qlabel {
    font-size: 12px; color: rgba(212,165,116,0.5); letter-spacing: 2px;
    margin-bottom: 8px; text-align: center;
  }
  .question-area textarea {
    width: 100%; display: block;
    background: rgba(212,165,116,0.04); border: 1px solid rgba(212,165,116,0.15);
    border-radius: 14px; padding: 14px 16px;
    font-size: 15px; font-family: inherit;
    color: #e8d5b0; line-height: 1.5;
    resize: vertical; min-height: 56px; max-height: 120px;
    outline: none; transition: border-color 0.3s;
  }
  .question-area textarea:focus {
    border-color: rgba(212,165,116,0.4);
    box-shadow: 0 0 12px rgba(212,165,116,0.04);
  }
  .question-area textarea::placeholder {
    color: rgba(232,224,212,0.15);
  }

  /* 骰子区 */
  .dice-row { display: flex; justify-content: center; gap: 20px; margin-bottom: 28px; }
  .die-wrap { flex: 1; max-width: 180px; text-align: center; }
  .die-label { font-size: 12px; color: rgba(212, 165, 116, 0.6); letter-spacing: 3px; margin-bottom: 10px; font-weight: 500; }
  .die {
    position: relative;
    background: linear-gradient(160deg, rgba(212,165,116,0.08) 0%, rgba(212,165,116,0.02) 100%);
    border: 1px solid rgba(212, 165, 116, 0.2); border-radius: 18px;
    padding: 28px 12px; min-height: 90px;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.3s, box-shadow 0.3s; overflow: hidden;
  }
  .die.rolling { border-color: rgba(212, 165, 116, 0.5); box-shadow: 0 0 24px rgba(212,165,116,0.08); }
  .die.settled { border-color: rgba(212, 165, 116, 0.35); }
  .die-value { font-size: 22px; font-weight: 600; color: #e8d5b0; line-height: 1.3; user-select: none; }
  .die-value.rolling-text { animation: shimmer 0.08s linear; }
  @keyframes shimmer { 0% { opacity: 0.3; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }
  .die-value.settled-text { animation: settlePop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
  @keyframes settlePop {
    0% { opacity: 0.5; transform: scale(0.85); }
    60% { transform: scale(1.08); }
    100% { opacity: 1; transform: scale(1); }
  }

  /* 按钮区 */
  .btn-area { text-align: center; margin-bottom: 24px; display: flex; justify-content: center; gap: 14px; flex-wrap: wrap; }

  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 14px 38px; font-size: 16px; font-weight: 600;
    border: none; border-radius: 50px; cursor: pointer; letter-spacing: 2px;
    transition: all 0.25s;
  }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

  .btn-throw {
    color: #0a0a1a;
    background: linear-gradient(135deg, #d4a574, #c8925e);
    box-shadow: 0 4px 20px rgba(212,165,116,0.25);
  }
  .btn-throw:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(212,165,116,0.35); }
  .btn-throw:active:not(:disabled) { transform: scale(0.96); }

  .btn-interpret {
    color: #d4a574;
    background: transparent;
    border: 1px solid rgba(212,165,116,0.3);
  }
  .btn-interpret:hover:not(:disabled) { border-color: rgba(212,165,116,0.6); background: rgba(212,165,116,0.04); }
  .btn-interpret:active:not(:disabled) { transform: scale(0.96); }

  .btn-copy {
    color: rgba(232,224,212,0.3); font-size: 12px; padding: 6px 14px;
    background: transparent; border: 1px solid rgba(232,224,212,0.08);
    letter-spacing: 1px;
  }
  .btn-copy:hover:not(:disabled) { border-color: rgba(232,224,212,0.2); color: rgba(232,224,212,0.5); }

  /* 结果区 */
  .result-area {
    background: rgba(212, 165, 116, 0.04);
    border: 1px solid rgba(212, 165, 116, 0.1); border-radius: 20px;
    padding: 20px 24px; margin-bottom: 20px;
    min-height: 56px; transition: all 0.4s;
  }

  .empty-result { text-align: center; color: rgba(232,224,212,0.2); font-size: 14px; letter-spacing: 1px; padding: 6px 0; }

  .result-content { display: none; }
  .result-content .r-step {
    font-size: 11px; color: rgba(212,165,116,0.25); letter-spacing: 2px;
    margin-bottom: 6px; text-align: center;
  }
  .result-content .r-question {
    font-size: 16px; font-weight: 500; color: #e8d5b0;
    text-align: center; margin-bottom: 14px;
    padding: 6px 12px; background: rgba(212,165,116,0.04);
    border-radius: 10px;
  }
  .result-content .r-combo {
    font-size: 20px; font-weight: 600; color: #e8d5b0;
    text-align: center; letter-spacing: 1px; margin-bottom: 12px;
  }
  .result-content .r-combo .dot { color: rgba(212,165,116,0.3); margin: 0 6px; }

  .result-content .r-reading {
    font-size: 14px; line-height: 1.8; color: rgba(232,224,212,0.65);
    text-align: center;
  }
  .r-reading .hl-p { color: #d4a574; }
  .r-reading .hl-s { color: #b8c4d8; }
  .r-reading .hl-h { color: #9ab8a8; }

  /* 解读正文 */
  .r-answer { margin: 12px 0 14px; }

  /* 直接回答（加粗醒目） */
  .r-direct-answer {
    margin: 10px 0 14px; padding: 12px 16px;
    background: rgba(212,165,116,0.06);
    border: 1px solid rgba(212,165,116,0.15);
    border-radius: 12px;
    font-size: 16px; font-weight: 600; line-height: 1.6;
    color: #e8d5b0; text-align: center;
  }

  .r-answer-p {
    font-size: 14px; line-height: 1.9; color: rgba(232,224,212,0.7);
    margin-bottom: 10px; padding: 0 2px; text-align: left;
  }
  .r-answer-p .hl-p { color: #d4a574; font-weight: 600; }
  .r-answer-p .hl-s { color: #b8c4d8; font-weight: 600; }
  .r-answer-p .hl-h { color: #9ab8a8; font-weight: 600; }
  .r-answer-p.r-summary {
    margin-top: 6px; padding: 10px 14px;
    background: rgba(212,165,116,0.04);
    border-left: 2px solid rgba(212,165,116,0.2);
    border-radius: 0 8px 8px 0;
    font-size: 13px; color: rgba(232,224,212,0.5);
  }

  /* 速查折叠 */
  .r-extra-toggle {
    font-size: 12px; color: rgba(212,165,116,0.25); cursor: pointer;
    user-select: none; transition: color 0.2s; text-align: center;
    padding: 4px 0;
  }
  .r-extra-toggle:hover { color: rgba(212,165,116,0.45); }
  .r-table { margin: 14px 0 12px; }
  .r-row {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 0; border-bottom: 1px solid rgba(212,165,116,0.06);
  }
  .r-row:last-child { border-bottom: none; }
  .r-cell { font-size: 14px; line-height: 1.5; }
  .r-cell.r-label {
    min-width: 40px; font-size: 11px; letter-spacing: 2px;
    color: rgba(212,165,116,0.35); font-weight: 500;
  }
  .r-cell .hl-p { color: #d4a574; font-weight: 600; }
  .r-cell .hl-s { color: #b8c4d8; font-weight: 600; }
  .r-cell .hl-h { color: #9ab8a8; font-weight: 600; }
  .r-cell.r-detail {
    color: rgba(232,224,212,0.35); font-size: 12px;
    margin-left: auto; text-align: right; max-width: 200px;
  }
  .r-deep-prompt {
    margin-top: 14px; padding: 10px 14px;
    background: rgba(212,165,116,0.04);
    border: 1px dashed rgba(212,165,116,0.12);
    border-radius: 12px; text-align: center;
    font-size: 12px; color: rgba(232,224,212,0.3);
    line-height: 1.6;
  }
  .r-deep-prompt strong { color: #d4a574; font-weight: 600; }

  /* 历史 */
  .history-area { margin-top: 4px; }
  .history-toggle {
    font-size: 12px; color: rgba(232,224,212,0.25); cursor: pointer;
    display: inline-flex; align-items: center; gap: 4px; user-select: none; transition: color 0.2s;
  }
  .history-toggle:hover { color: rgba(232,224,212,0.45); }
  .history-list { margin-top: 10px; max-height: 0; overflow: hidden; transition: max-height 0.4s ease; }
  .history-list.open { max-height: 360px; overflow-y: auto; }
  .history-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 4px; border-bottom: 1px solid rgba(212,165,116,0.05);
    font-size: 13px; color: rgba(232,224,212,0.4);
  }
  .history-item:last-child { border-bottom: none; }
  .history-item .h-time { font-size: 11px; color: rgba(232,224,212,0.2); min-width: 52px; }
  .history-item .h-combo { color: rgba(232,224,212,0.6); font-weight: 500; flex: 1; margin: 0 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .history-item .h-view {
    font-size: 11px; color: rgba(212,165,116,0.3); cursor: pointer;
    padding: 2px 6px; border-radius: 4px; transition: color 0.2s;
  }
  .history-item .h-view:hover { color: rgba(212,165,116,0.6); }
  .history-list::-webkit-scrollbar { width: 3px; }
  .history-list::-webkit-scrollbar-track { background: transparent; }
  .history-list::-webkit-scrollbar-thumb { background: rgba(212,165,116,0.15); border-radius: 10px; }

  @media (max-width: 520px) {
    .container { padding: 32px 20px 28px; border-radius: 28px; }
    .dice-row { gap: 12px; }
    .die { padding: 20px 8px; min-height: 72px; }
    .die-value { font-size: 18px; }
    .header h1 { font-size: 24px; }
    .btn { padding: 12px 28px; font-size: 15px; }
    .result-content .r-combo { font-size: 17px; }
    .result-content .r-question { font-size: 14px; }
    .question-area textarea { font-size: 14px; }
  }

  @media (max-width: 400px) {
    .dice-row { gap: 8px; }
    .die { padding: 16px 6px; min-height: 64px; }
    .die-value { font-size: 15px; }
    .die-label { font-size: 10px; letter-spacing: 1px; }
    .container { padding: 24px 14px 20px; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>✦ 星 骰 ✦</h1>
    <div class="subtitle">— ASTROLOGICAL DICE —</div>
  </div>

  <!-- 第一步：输入问题 -->
  <div class="question-area">
    <div class="qlabel">你 的 问 题</div>
    <textarea id="question-input" placeholder="写下你想问的问题……" maxlength="200"></textarea>
  </div>

  <!-- 骰子 -->
  <div class="dice-row">
    <div class="die-wrap">
      <div class="die-label">行 星</div>
      <div class="die" id="die-planet"><div class="die-value" id="val-planet">✦</div></div>
    </div>
    <div class="die-wrap">
      <div class="die-label">星 座</div>
      <div class="die" id="die-sign"><div class="die-value" id="val-sign">✦</div></div>
    </div>
    <div class="die-wrap">
      <div class="die-label">宫 位</div>
      <div class="die" id="die-house"><div class="die-value" id="val-house">✦</div></div>
    </div>
  </div>

  <!-- 第二步 + 第三步：按钮 -->
  <div class="btn-area">
    <button class="btn btn-throw" id="btn-throw"><span>·</span> 投 掷 <span>·</span></button>
    <button class="btn btn-interpret" id="btn-interpret" disabled>解 读</button>
    <button class="btn btn-copy" id="btn-copy" disabled>复制结果</button>
  </div>

  <!-- 结果展示 -->
  <div class="result-area" id="result-area">
    <div class="empty-result" id="empty-msg">写问题 → 投掷 → 解读</div>
    <div class="result-content" id="result-content">
      <div class="r-step"></div>
      <div class="r-question" id="r-question"></div>
      <div class="r-combo" id="r-combo"></div>
      <div class="r-reading" id="r-reading"></div>
    </div>
  </div>

  <!-- 历史 -->
  <div class="history-area">
    <div class="history-toggle" id="history-toggle">▸ 历史记录</div>
    <div class="history-list" id="history-list"></div>
  </div>

</div>

<script>
// ===== 数据 =====
const PLANETS = [
  { name: '太阳', keywords: '自我、目标、生命力、彰显、权威', energy: '核心自我与生命力的展现' },
  { name: '月亮', keywords: '情绪、习惯、潜意识、滋养、安全感', energy: '内在情绪与习惯性反应' },
  { name: '水星', keywords: '思维、沟通、信息、学习、交流', energy: '理性思考与信息交换' },
  { name: '金星', keywords: '爱、美、关系、金钱、愉悦、和谐', energy: '吸引力与价值感的表达' },
  { name: '火星', keywords: '行动、冲动、竞争、欲望、勇气', energy: '主动出击与欲望驱动' },
  { name: '木星', keywords: '扩张、幸运、成长、乐观、机会', energy: '幸运扩张与成长契机' },
  { name: '土星', keywords: '限制、责任、纪律、压力、现实', energy: '结构性约束与长期责任' },
  { name: '天王星', keywords: '突然、变革、创新、自由、科技', energy: '突破常规的意外变革' },
  { name: '海王星', keywords: '幻想、逃避、灵性、模糊、灵感', energy: '消融边界的灵性感知' },
  { name: '冥王星', keywords: '转化、死亡与重生、深度、控制', energy: '深度转化的颠覆性力量' },
  { name: '北交点', keywords: '灵魂方向、新领域、命运召唤', energy: '灵魂进化的方向指引' },
  { name: '南交点', keywords: '过去业力、习惯模式、放下', energy: '需要放下的旧有模式' }
];

const SIGNS = [
  { name: '白羊座', element: '火', mode: '本位', style: '冲动直接、勇敢独立、主动开创' },
  { name: '金牛座', element: '土', mode: '固定', style: '稳固持久、务实享受、坚定固执' },
  { name: '双子座', element: '风', mode: '变动', style: '灵活好奇、善于沟通、多元变化' },
  { name: '巨蟹座', element: '水', mode: '本位', style: '保护敏感、情绪归属、关怀滋养' },
  { name: '狮子座', element: '火', mode: '固定', style: '自信骄傲、创造表演、热情慷慨' },
  { name: '处女座', element: '土', mode: '变动', style: '细致分析、完美主义、务实服务' },
  { name: '天秤座', element: '风', mode: '本位', style: '平衡合作、社交和谐、追求公正' },
  { name: '天蝎座', element: '水', mode: '固定', style: '深度秘密、控制转化、极致强烈' },
  { name: '射手座', element: '火', mode: '变动', style: '探索自由、乐观扩张、追求真理' },
  { name: '摩羯座', element: '土', mode: '本位', style: '责任野心、务实结构、长期规划' },
  { name: '水瓶座', element: '风', mode: '固定', style: '创新独立、反叛独特、群体关怀' },
  { name: '双鱼座', element: '水', mode: '变动', style: '同情灵感、幻灭超越、流动融合' }
];

const HOUSES = [
  { name: '第1宫', area: '自己、外表、自我形象、身体', desc: '一切「我」的开端，自我呈现方式' },
  { name: '第2宫', area: '金钱、资源、个人价值、自尊', desc: '物质基础与自我价值感' },
  { name: '第3宫', area: '沟通、学习、兄弟姐妹、出行', desc: '日常信息交流与基础学习' },
  { name: '第4宫', area: '家庭、根源、内在情感、房产', desc: '内心根基与家族归属' },
  { name: '第5宫', area: '娱乐、恋爱、孩子、创造力', desc: '自我表达与纯粹快乐' },
  { name: '第6宫', area: '工作、健康、日常事务、服务', desc: '日常秩序与责任管理' },
  { name: '第7宫', area: '婚姻、合作、公开对手、关系', desc: '一对一关系与契约合作' },
  { name: '第8宫', area: '共同资源、性、危机、深层心理', desc: '深度融合与转化议题' },
  { name: '第9宫', area: '高等教育、旅行、哲学、信仰', desc: '探索意义与远方视野' },
  { name: '第10宫', area: '事业、名声、社会地位、目标', desc: '社会成就与人生使命' },
  { name: '第11宫', area: '朋友、团体、希望、愿景', desc: '社交圈与集体理想' },
  { name: '第12宫', area: '潜意识、孤寂、灵修、隐藏', desc: '内在秘境与灵性归处' }
];

// 星座搭配对应关系（用于解读时的元素/模式分析）
const ELEM_MAP = { '火': '行动与热情', '土': '务实与物质', '风': '思维与沟通', '水': '情绪与直觉' };
const MODE_MAP = { '本位': '主动开创', '固定': '持续稳定', '变动': '灵活调整' };

// ===== 状态 =====
let rolling = false;
let hasResult = false;
let currentResult = null; // { planet, sign, house }
let currentQuestion = '';
let history = [];
try { const s = localStorage.getItem('star-dice-history'); if (s) history = JSON.parse(s); } catch(e) {}

// ===== DOM =====
const $ = id => document.getElementById(id);
const valPlanet = $('val-planet'), valSign = $('val-sign'), valHouse = $('val-house');
const diePlanet = $('die-planet'), dieSign = $('die-sign'), dieHouse = $('die-house');
const btnThrow = $('btn-throw'), btnInterpret = $('btn-interpret'), btnCopy = $('btn-copy');
const questionInput = $('question-input');
const resultContent = $('result-content'), emptyMsg = $('empty-msg');
const rQuestion = $('r-question'), rCombo = $('r-combo'), rReading = $('r-reading');
const historyToggle = $('history-toggle'), historyList = $('history-list');

// ===== 工具函数 =====
function randomItem(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function formatTime() {
  const d = new Date();
  const pad = n => String(n).padStart(2, '0');
  return `${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

// ===== 核心：三步流程 =====

// 1. 投掷
function throwDice() {
  if (rolling) return;
  rolling = true;
  hasResult = false;
  currentResult = null;

  btnThrow.disabled = true;
  btnInterpret.disabled = true;
  btnCopy.disabled = true;
  btnThrow.innerHTML = '<span>·</span> 掷 出 <span>·</span>';

  // 记录当前问题
  currentQuestion = questionInput.value.trim();

  // 隐藏结果区
  resultContent.style.display = 'none';
  emptyMsg.style.display = 'none';

  [diePlanet, dieSign, dieHouse].forEach(d => {
    d.classList.remove('settled');
    d.classList.add('rolling');
  });

  const els = [
    { el: valPlanet, arr: PLANETS },
    { el: valSign, arr: SIGNS },
    { el: valHouse, arr: HOUSES }
  ];

  const result = {
    planet: randomItem(PLANETS),
    sign: randomItem(SIGNS),
    house: randomItem(HOUSES)
  };

  const phases = [
    { duration: 400, interval: 50 },
    { duration: 400, interval: 100 },
    { duration: 400, interval: 200 },
    { duration: 350, interval: 350 }
  ];

  let phaseIndex = 0;
  function runPhase() {
    if (phaseIndex >= phases.length) { finishRoll(result); return; }
    const phase = phases[phaseIndex];
    const cycles = Math.floor(phase.duration / phase.interval);
    let count = 0;
    const timer = setInterval(() => {
      els.forEach(({ el, arr }) => {
        el.textContent = randomItem(arr).name;
        el.className = 'die-value rolling-text';
      });
      count++;
      if (count >= cycles) { clearInterval(timer); phaseIndex++; runPhase(); }
    }, phase.interval);
  }

  function finishRoll(result) {
    valPlanet.textContent = result.planet.name;
    valSign.textContent = result.sign.name;
    valHouse.textContent = result.house.name;
    [valPlanet, valSign, valHouse].forEach(el => el.className = 'die-value settled-text');
    [diePlanet, dieSign, dieHouse].forEach(d => {
      d.classList.remove('rolling');
      d.classList.add('settled');
    });

    currentResult = result;
    hasResult = true;

    // 只在结果区显示组合（不自动解读）
    const combo = `${result.planet.name} · ${result.sign.name} · ${result.house.name}`;
    rCombo.textContent = combo;
    rQuestion.textContent = currentQuestion || '（未填写问题）';
    rReading.innerHTML = '';
    resultContent.style.display = 'block';
    resultContent.style.opacity = 0;
    let op = 0;
    const fade = setInterval(() => { op += 0.08; resultContent.style.opacity = op; if (op >= 1) clearInterval(fade); }, 30);

    // 启用解读按钮
    btnInterpret.disabled = false;
    btnCopy.disabled = false;

    rolling = false;
    btnThrow.disabled = false;
    btnThrow.innerHTML = '<span>·</span> 再掷一次 <span>·</span>';
  }

  runPhase();
}

function detectQuestionType(q) {
  if (!q) return null;
  for (const p of Q_PATTERNS) {
    for (const kw of p.keywords) {
      if (q.includes(kw)) return p;
    }
  }
  return null;
}

// 生成直接结论句
function generateDirectAnswer(qType, planetName) {
  if (!qType) {
    // 没有匹配到类型，用通用
    return VERDICTS.general[planetName] || '';
  }
  const verdicts = VERDICTS[qType.type];
  if (verdicts && verdicts[planetName]) {
    return verdicts[planetName];
  }
  return VERDICTS.general[planetName] || '';
}

// 2. 生成解读（基于问题+骰子的三段式回答）
function generateInterpretation() {
  if (!hasResult || !currentResult) return;
  const { planet, sign, house } = currentResult;
  const question = currentQuestion || '';

  const pReading = PLANET_READINGS[planet.name] || '';
  const sReading = SIGN_READINGS[sign.name] || '';
  const hReading = HOUSE_READINGS[house.name] || '';

  const qType = detectQuestionType(question);

  // 构建封面：问题 + 组合
  let html = `<div class="r-question">${question || '（未提出问题）'}</div>`;
  html += `<div class="r-combo">${planet.name} · ${sign.name} · ${house.name}</div>`;

  // ---- 直接回答：先给结论 ----
  const directAnswer = generateDirectAnswer(qType, planet.name);
  if (directAnswer) {
    html += `<div class="r-direct-answer">${directAnswer}</div>`;
  }

  // ---- 详细解读 ----
  html += `<div class="r-answer">`;

  // 开篇：如果检测到问题类型，加一句定向
  if (qType && question) {
    html += `<p class="r-answer-p">关于「${qType.label}」的问题，骰子给出的指引是——</p>`;
  }

  // 段落1：行星能量
  html += `<p class="r-answer-p"><span class="hl-p">${planet.name}</span> ${pReading}</p>`;

  // 段落2：星座方式
  html += `<p class="r-answer-p"><span class="hl-s">${sign.name}</span> ${sReading}</p>`;

  // 段落3：宫位领域
  html += `<p class="r-answer-p"><span class="hl-h">${house.name}</span> ${hReading}</p>`;

  // 段落4：结合问题的总结
  if (question) {
    html += `<p class="r-answer-p r-summary">总结来说，关于「${question.length > 20 ? question.slice(0, 20) + '…' : question}」，${planet.name}的能量推动你关注「${planet.keywords.split('、')[0]}」，${sign.name}建议你用「${sign.style.split('、')[0]}」的节奏，而在${house.name}的领域（${house.area.split('、')[0]}）中将显现出结果。</p>`;
  }

  html += `</div>`;

  // ---- 速查附录 ----
  html += `<div class="r-extra-toggle" onclick="toggleExtra()">▸ 查看三要素速查</div>`;
  html += `<div class="r-extra" id="r-extra" style="display:none;">`;
  const rows = [
    { label: '行星', name: planet.name, detail: planet.keywords, cls: 'hl-p' },
    { label: '星座', name: sign.name, detail: `${sign.element}象 · ${sign.mode} · ${sign.style}`, cls: 'hl-s' },
    { label: '宫位', name: house.name, detail: house.area, cls: 'hl-h' }
  ];
  html += `<div class="r-table">`;
  rows.forEach(r => {
    html += `<div class="r-row">
      <div class="r-cell r-label">${r.label}</div>
      <div class="r-cell"><span class="${r.cls}">${r.name}</span></div>
      <div class="r-cell r-detail">${r.detail}</div>
    </div>`;
  });
  html += `</div></div>`;

  // 深度解读入口
  html += `<div class="r-deep-prompt">
    如果需要更贴合你个人经历的深度解读，<strong>复制结果发给小鱼</strong>，她会结合你的具体情况继续分析
  </div>`;

  rReading.innerHTML = html;
  rQuestion.textContent = question;
  rCombo.textContent = `${planet.name} · ${sign.name} · ${house.name}`;

  // 历史记录
  const record = {
    time: formatTime(),
    combo: `${planet.name} · ${sign.name} · ${house.name}`,
    question: currentQuestion,
    planet: planet.name, sign: sign.name, house: house.name
  };
  history.unshift(record);
  if (history.length > 20) history.pop();
  try { localStorage.setItem('star-dice-history', JSON.stringify(history)); } catch(e) {}
  renderHistory();
}

// 速查折叠
function toggleExtra() {
  const el = document.getElementById('r-extra');
  const toggler = el.previousElementSibling;
  if (el.style.display === 'none') {
    el.style.display = 'block';
    toggler.textContent = '▾ 收起速查';
  } else {
    el.style.display = 'none';
    toggler.textContent = '▸ 查看三要素速查';
  }
}

// 3. 复制结果（格式：问题 + 组合，方便粘贴给小鱼）
function copyResult() {
  if (!hasResult || !currentResult) return;
  const { planet, sign, house } = currentResult;
  const q = currentQuestion || '';
  const combo = `${planet.name}·${sign.name}·${house.name}`;
  const text = q ? `${q}\n${combo}` : combo;

  // 现代 clipboard API
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => {
      const orig = btnCopy.textContent;
      btnCopy.textContent = '✓ 已复制';
      setTimeout(() => btnCopy.textContent = orig, 1200);
    }).catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed'; ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); btnCopy.textContent = '✓ 已复制'; setTimeout(() => btnCopy.textContent = '复制结果', 1200); } catch(e) {}
  document.body.removeChild(ta);
}

// ===== 历史记录 =====
function renderHistory() {
  historyList.innerHTML = '';
  if (history.length === 0) {
    historyList.innerHTML = '<div style="color:rgba(232,224,212,0.15);font-size:12px;text-align:center;padding:12px 0;">暂无记录</div>';
    return;
  }
  history.forEach((item, idx) => {
    const div = document.createElement('div');
    div.className = 'history-item';
    div.innerHTML = `
      <span class="h-time">${item.time}</span>
      <span class="h-combo">${item.question ? item.question.slice(0, 18) + (item.question.length > 18 ? '…' : '') : '—'} ${item.combo}</span>
      <span class="h-view" data-idx="${idx}">查看</span>
    `;
    div.querySelector('.h-view').addEventListener('click', () => {
      // 回填骰面
      const p = PLANETS.find(x => x.name === item.planet);
      const s = SIGNS.find(x => x.name === item.sign);
      const h = HOUSES.find(x => x.name === item.house);
      if (p && s && h) {
        currentResult = { planet: p, sign: s, house: h };
        hasResult = true;
        currentQuestion = item.question || '';
        valPlanet.textContent = p.name; valSign.textContent = s.name; valHouse.textContent = h.name;
        [valPlanet, valSign, valHouse].forEach(el => el.className = 'die-value settled-text');
        [diePlanet, dieSign, dieHouse].forEach(d => { d.classList.remove('rolling'); d.classList.add('settled'); });
        rCombo.textContent = item.combo;
        rReading.innerHTML = '';
        rQuestion.textContent = currentQuestion || '（未填写问题）';
        resultContent.style.display = 'block'; resultContent.style.opacity = 1;
        emptyMsg.style.display = 'none';
        btnInterpret.disabled = false;
        btnCopy.disabled = false;
      }
    });
    historyList.appendChild(div);
  });
}

// ===== 事件绑定 =====
btnThrow.addEventListener('click', throwDice);
btnInterpret.addEventListener('click', generateInterpretation);
btnCopy.addEventListener('click', copyResult);

// 空格投掷（输入框里不触发）
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.code === 'Space') { e.preventDefault(); throwDice(); }
});

// 历史折叠
let historyOpen = false;
historyToggle.addEventListener('click', () => {
  historyOpen = !historyOpen;
  historyList.classList.toggle('open', historyOpen);
  historyToggle.textContent = historyOpen ? '▾ 历史记录' : '▸ 历史记录';
  if (historyOpen) renderHistory();
});

// 初始化
renderHistory();
</script>
</body>
</html>
